name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        run: echo "MAPBOX_PUBLIC_TOKEN=${{ secrets.MAPBOX_PUBLIC_TOKEN }}" > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build IPA (no code signing)
        run: flutter build ipa --no-codesign

      - name: Package IPA from xcarchive
        run: |
          ARCHIVE=$(find build/ios -name "*.xcarchive" | head -1)
          echo "Archive: $ARCHIVE"
          mkdir -p Payload
          cp -r "$ARCHIVE/Products/Applications/Runner.app" Payload/
          zip -r campusnav.ipa Payload/
          echo "Done: $(ls -lh campusnav.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: campusnav-ipa
          path: campusnav.ipa
          retention-days: 7
