name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        run: echo "MAPBOX_PUBLIC_TOKEN=${{ secrets.MAPBOX_PUBLIC_TOKEN }}" > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build and package IPA
        run: |
          # flutter build ipa archives successfully but fails at the export/signing step.
          # We allow that failure and extract the IPA ourselves from the xcarchive.
          flutter build ipa --no-codesign || true

          ARCHIVE=$(find build/ios -name "*.xcarchive" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "ERROR: No xcarchive found — build failed before archiving."
            exit 1
          fi
          echo "Archive: $ARCHIVE"

          APP="$ARCHIVE/Products/Applications/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found inside archive."
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r campusnav.ipa Payload/
          echo "IPA ready: $(ls -lh campusnav.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: campusnav-ipa
          path: campusnav.ipa
          retention-days: 7
