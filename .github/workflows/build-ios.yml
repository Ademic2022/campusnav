name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        run: echo "MAPBOX_PUBLIC_TOKEN=${{ secrets.MAPBOX_PUBLIC_TOKEN }}" > .env

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Disable Swift Package Manager (use CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Build IPA (allow signing-export failure, we extract manually)
        run: flutter build ipa --no-codesign || true
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""

      - name: Package IPA from xcarchive
        run: |
          echo "=== Searching for xcarchive ==="
          find build -name "*.xcarchive" 2>/dev/null || echo "none found under build/"
          find ~/Library/Developer/Xcode/Archives -name "*.xcarchive" 2>/dev/null | head -5 || true

          ARCHIVE=$(find build -name "*.xcarchive" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            ARCHIVE=$(find ~/Library/Developer/Xcode/Archives -name "*.xcarchive" 2>/dev/null | head -1)
          fi

          if [ -z "$ARCHIVE" ]; then
            echo "ERROR: No xcarchive found anywhere."
            exit 1
          fi

          echo "Using archive: $ARCHIVE"
          APP="$ARCHIVE/Products/Applications/Runner.app"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r campusnav.ipa Payload/
          echo "IPA ready: $(ls -lh campusnav.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: campusnav-ipa
          path: campusnav.ipa
          retention-days: 7
