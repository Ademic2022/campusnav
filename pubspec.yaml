name: oau_navigator
description: OAU Navigator — Campus navigation app for Obafemi Awolowo University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'
  flutter: '>=3.22.3'

dependencies:
  flutter:
    sdk: flutter

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Map rendering
  mapbox_maps_flutter: ^2.22.0

  # GPS location
  geolocator: ^14.0.2

  # Local storage (community-maintained Hive fork)
  hive_ce_flutter: ^2.3.4

  # HTTP client for Mapbox Directions API
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # App navigation/routing
  go_router: ^14.2.0

  # Lat/lng math utilities
  latlong2: ^0.9.1

  # Custom Google Fonts
  google_fonts: ^6.2.1

  # Shimmer loading effects
  shimmer: ^3.0.0

  # App icons + platform utils
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_ce_generator: ^1.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/data/landmarks.json
    - .env
